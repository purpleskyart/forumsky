# Automates versioning and deployment.
# Structure:
# 1. 'bump' job: Updates version and pushes a 'chore' commit.
# 2. 'build' job: Runs after the bump, builds the app, and prepares it for hosting.
# 3. 'deploy' job: Publishes the build results to GitHub Pages.
name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  bump:
    # Only run on pushes that aren't already version bumps to avoid loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      new_sha: ${{ steps.push.outputs.new_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Git Config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        run: npm version patch -m "chore: bump version to %s [skip ci]"

      - name: Push changes
        id: push
        run: |
          git push origin main --follow-tags
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    # Run after the bump job is complete
    needs: bump
    runs-on: ubuntu-latest
    steps:
      # We check out the NEW sha pushed by the 'bump' job
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: OAuth client metadata
        env:
          SITE_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: node scripts/write-client-metadata.mjs

      - name: Build
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - run: npm run gh-pages:prepare

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
