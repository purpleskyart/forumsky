# Build, version bump, and deploy to GitHub Pages.
name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Avoid infinite loops from version bump commits and focus on user-initiated pushes
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # 1. Version Management
      # Bump version locally before building so the 'Settings' page reflects the new version immediately.
      - name: Git Config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        run: |
          npm version patch -m "chore: bump version to %s [skip ci]"

      # 2. Application Build
      - name: OAuth client metadata
        env:
          SITE_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: node scripts/write-client-metadata.mjs

      - name: Build
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - run: npm run gh-pages:prepare

      # 3. Finalize and Push
      # Only push the version bump once we know the build is successful.
      - name: Push changes
        run: git push origin main --follow-tags

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
