# Build and deploy to GitHub Pages (project site: https://<owner>.github.io/<repo>/).
# Repo Settings → Pages → Source: GitHub Actions.
# Custom domain later: use SITE_ORIGIN=https://your.domain and GITHUB_PAGES_BASE=/ (or unset).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: OAuth client metadata for this host
        env:
          SITE_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: node scripts/write-client-metadata.mjs
      - name: Build
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - run: npm run gh-pages:prepare
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
